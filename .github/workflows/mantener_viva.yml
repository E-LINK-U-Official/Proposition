name: Mantener App Viva

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 y 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Permite activarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
    - name: Simular visita humana con Curl
      run: |
        curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -L "https://streamlit.app"
